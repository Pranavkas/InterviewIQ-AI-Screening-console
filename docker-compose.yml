version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    # Optional local Ollama integration if they run it in Docker
    # environment:
    #   - OLLAMA_BASE_URL=http://ollama:11434
    # depends_on:
    #   - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Note: In production, change this to your backend's public domain URL
        - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "8000:80"
    depends_on:
      - backend

  # Optional local Ollama service for fully offline Docker deployment
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

# volumes:
#   ollama_data:
